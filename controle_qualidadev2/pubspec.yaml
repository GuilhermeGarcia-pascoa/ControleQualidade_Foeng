name: controle_qualidade_foeng
description: App de Controlo de Qualidade FOENG.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  flutter_launcher_icons: "^0.13.1" # Adiciona isto
  sqflite: ^2.3.0
  path: ^1.8.3
  image_picker: ^1.0.7
  shared_preferences: ^2.5.5
  intl: ^0.19.0
  path_provider: ^2.1.2
  crypto: ^3.0.3
  http: ^1.6.0
  google_fonts: ^6.2.1  # Verifica a versão mais recente, se necessário

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/LogoApp.png" # O nome exato da tua imagem
  adaptive_icon_background: "#FFFFFF" # Cor de fundo (caso a imagem seja redonda)
  adaptive_icon_foreground: "assets/images/LogoApp.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
    - assets/config.json